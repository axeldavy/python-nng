name: Build and Upload Wheels

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels_linux:
    name: Build Linux wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64 cp313t-manylinux_x86_64 cp314-manylinux_x86_64 cp314t-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_ENABLE: "cpython-freethreading"
        run: python -m cibuildwheel --platform linux --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl

  build_wheels_windows:
    name: Build Windows wheels
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-win_amd64 cp312-win_amd64 cp313-win_amd64 cp313t-win_amd64 cp314-win_amd64 cp314t-win_amd64"
          CIBW_ENABLE: "cpython-freethreading"
        run: python -m cibuildwheel --platform windows --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: wheelhouse/*.whl

  build_wheels_macos_x86:
    name: Build macOS wheels (x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel wheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-macosx_x86_64 cp312-macosx_x86_64 cp313-macosx_x86_64 cp313t-macosx_x86_64 cp314-macosx_x86_64 cp314t-macosx_x86_64"
          CIBW_ENABLE: "cpython-freethreading"
          CIBW_ENVIRONMENT: "MACOSX_DEPLOYMENT_TARGET=10.15"
          MACOSX_DEPLOYMENT_TARGET: '10.15'
          CMAKE_OSX_ARCHITECTURES: x86_64
          ARCHFLAGS: "-arch x86_64"
        run: python -m cibuildwheel --platform macos --archs x86_64 --output-dir wheelhouse

      - name: Fix wheel tag
        run: |
          for wheel in wheelhouse/*.whl; do
            python -m wheel tags --platform-tag=macosx_10_15_x86_64 --remove "$wheel"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: wheelhouse/*.whl

  build_wheels_macos_arm:
    name: Build macOS wheels (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel wheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-macosx_arm64 cp312-macosx_arm64 cp313-macosx_arm64 cp313t-macosx_arm64 cp314-macosx_arm64 cp314t-macosx_arm64"
          CIBW_ENABLE: "cpython-freethreading"
          CIBW_ENVIRONMENT: "MACOSX_DEPLOYMENT_TARGET=11.0"
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: python -m cibuildwheel --platform macos --archs arm64 --output-dir wheelhouse

      - name: Fix wheel tag
        run: |
          for wheel in wheelhouse/*.whl; do
            python -m wheel tags --platform-tag=macosx_11_0_arm64 --remove "$wheel"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: wheelhouse/*.whl

  collect:
    needs: [build_sdist, build_wheels_linux, build_wheels_windows, build_wheels_macos_x86, build_wheels_macos_arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: actions/upload-artifact@v4
        with:
          name: all-dist
          path: dist/
